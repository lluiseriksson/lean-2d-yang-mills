name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject Lean placeholders
        run: |
          branch="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}}"
          if grep -R -n -E '\baxiom\b' Lean2dYangMills Lean2dYangMills.lean; then
            exit 1
          fi
          if [ "${branch#frontier/}" = "$branch" ]; then
            if grep -R -n -E '\bsorry\b' Lean2dYangMills Lean2dYangMills.lean; then
              exit 1
            fi
          else
            echo "frontier branch: allowing tracked Lean sorry placeholders"
          fi
      - uses: leanprover/lean-action@v1
        with:
          use-mathlib-cache: true
          build-args: Lean2dYangMills
